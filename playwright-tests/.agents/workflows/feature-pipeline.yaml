name: feature-pipeline
description: Full feature development pipeline for Playwright test work

phases:
  - name: requirements
    agent: pm-agent
    mode: feature
    description: Write requirements and acceptance criteria
    input: user_request
    output: prd_document
    validation:
      - PRD document exists
      - Acceptance criteria defined

  - name: architecture
    agent: architect-agent
    mode: design
    description: Design test architecture and interfaces
    input: prd_document
    output: architecture_design
    depends_on: [requirements]
    validation:
      - Interfaces or page object boundaries defined
      - No boundary violations (spec vs page object)

  - name: implementation
    agent: playwright-writer-agent
    mode: feature
    description: Implement changes in specs, page objects, and fixtures
    input: architecture_design
    output: implementation_result
    depends_on: [architecture]
    validation:
      - Code compiles
      - Targeted tests pass or are noted

  - name: review
    agent: playwright-review-agent
    mode: review
    description: Review for quality, stability, and boundary violations
    input: implementation_result
    output: review_report
    depends_on: [implementation]
    validation:
      - No CRITICAL issues
      - No HIGH stability risks

error_handling:
  on_phase_failure: stop_pipeline
  on_validation_failure: retry_phase_once

context_contracts:
  requirements_to_architecture:
    detail_level: full
    max_lines: 500
  architecture_to_implementation:
    detail_level: sections
    max_lines: 300
  implementation_to_review:
    detail_level: file_manifest
    max_lines: 200
